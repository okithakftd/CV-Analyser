sonar.projectKey=skill-gap-analyzer
sonar.projectName=Skill Gap Analyzer
sonar.projectVersion=1.0.0

# Source roots — Python backend + TypeScript frontend
sonar.sources=src,api_main.py,skill_matcher.py,api_ml_implementation.py
sonar.tests=src/__tests__,tests

# Exclude build artifacts and generated code
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.min.js,**/__pycache__/**

# Test file inclusions
sonar.test.inclusions=src/__tests__/**,tests/**

# Coverage reports
# Frontend: generated by `npm run test:coverage` (lcov format)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# Backend: generated by pytest-cov (xml format)
sonar.python.coverage.reportPaths=coverage-python/coverage.xml

sonar.python.version=3.11
sonar.sourceEncoding=UTF-8
