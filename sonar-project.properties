sonar.projectKey=skill-gap-analyzer
sonar.projectName=Skill Gap Analyzer
sonar.projectVersion=1.0.0

# Source roots
sonar.sources=src,backend/api_main.py,backend/skill_matcher.py
sonar.tests=src/__tests__,backend/tests

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.min.js,**/__pycache__/**

# Test inclusions
sonar.test.inclusions=src/__tests__/**,backend/tests/**

# Coverage reports
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.python.coverage.reportPaths=coverage-python/coverage.xml

sonar.python.version=3.11
sonar.sourceEncoding=UTF-8
